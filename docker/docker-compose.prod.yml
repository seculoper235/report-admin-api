name: admin-prod

# 관리자 API 전용 구성. front-api와 "같은 데이터"(상품·코드·회원)를 다루므로
# 별도 DB/Redis를 띄우지 않고, front-api(daily-prod)가 띄운 Postgres/Redis를 공유한다.
#
# 전제:
#   - 먼저 report-front-api의 docker-compose.prod.yml(name: daily-prod)이 떠 있어야 한다.
#     그 compose의 기본 네트워크 이름은 "daily-prod_default" 이다.
#     (확인: docker network ls | grep daily-prod)
#   - .env.prod 의 DB_USER/DB_PASSWORD/JWT_SECRET 은 front-api와 "동일한 값"을 사용해야 한다.
#     (같은 DB·같은 회원/토큰을 공유하므로)
#
# 실행: docker compose -f docker/docker-compose.prod.yml --env-file docker/.env.prod up -d --build
services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: report-admin-api:latest
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: server
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
      # front-api가 띄운 컨테이너 이름으로 접속 (공유 네트워크)
      DB_HOST: daily-db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: daily-redis
      JWT_SECRET: ${JWT_SECRET}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_PUBLIC_BUCKET: ${AWS_S3_PUBLIC_BUCKET}
      AWS_S3_PRIVATE_BUCKET: ${AWS_S3_PRIVATE_BUCKET}
    ports:
      # front-api는 8080을 쓰므로 관리자 API는 8090으로 노출(충돌 회피).
      - "8090:8080"
    networks:
      - shared

networks:
  shared:
    external: true
    # front-api compose(name: daily-prod)가 만든 기본 네트워크.
    name: daily-prod_default
